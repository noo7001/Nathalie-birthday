<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy birthday Nathalie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&family=Kalam:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #f9a7f5;
      --maroon: #800000;
      --bg: #000000;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: "Quicksand", system-ui, sans-serif;
    }

    .page {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    /* Soft animated glow behind the art (doesn’t cover the drawing) */
    .page::before {
      content: "";
      position: absolute;
      inset: -25%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 15% 75%, rgba(249, 167, 245, 0.09) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 88% 18%, rgba(128, 0, 0, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(40, 10, 30, 0.35) 0%, transparent 65%);
      animation: bgPulse 22s ease-in-out infinite alternate, bgDrift 32s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%,
      100% {
        opacity: 0.75;
        filter: brightness(1);
      }
      50% {
        opacity: 1;
        filter: brightness(1.08);
      }
    }

    @keyframes bgDrift {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      100% {
        transform: translate(2.5%, -1.5%) scale(1.06) rotate(1.2deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene-wrap,
      .page::before,
      .gift-hotspot::before,
      .heart-particle {
        animation: none !important;
      }
    }

    /* Floating hearts (background + soft layer over the art) */
    .hearts-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .hearts-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .heart-particle {
      position: absolute;
      will-change: transform;
    }

    .heart-particle svg {
      display: block;
      filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.35));
    }

    .hearts-bg .heart-particle {
      opacity: 0.5;
    }

    .hearts-overlay .heart-particle {
      opacity: 0.2;
    }

    @keyframes heartFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(1);
      }
      50% {
        transform: translate3d(var(--dx, 12px), var(--dy, -18px), 0) rotate(calc(var(--rot, 0deg) + 8deg)) scale(1.12);
      }
    }

    @keyframes heartDriftSlow {
      0% {
        transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(1);
      }
      33% {
        transform: translate3d(var(--dx, 10px), var(--dy, 8px), 0) rotate(calc(var(--rot, 0deg) + 5deg)) scale(1.06);
      }
      66% {
        transform: translate3d(calc(var(--dx, 10px) * -0.8), var(--dy2, -14px), 0) rotate(calc(var(--rot, 0deg) - 4deg)) scale(0.94);
      }
      100% {
        transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(1);
      }
    }

    .scene-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: sceneSway 18s ease-in-out infinite;
    }

    @keyframes sceneSway {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      33% {
        transform: translate(3px, -4px) rotate(0.35deg) scale(1.008);
      }
      66% {
        transform: translate(-2px, 2px) rotate(-0.25deg) scale(1.005);
      }
    }

    /* Frame matches rendered image size so the gift hotspot stays aligned with the white box */
    .scene-frame {
      position: relative;
      z-index: 0;
      display: inline-block;
      line-height: 0;
      max-width: 100vw;
      max-height: 100vh;
    }

    .scene {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Click target: white gift box + hook */
    .gift-hotspot {
      position: absolute;
      z-index: 3;
      bottom: 3.5%;
      right: 22%;
      left: auto;
      width: 11%;
      min-width: 58px;
      max-width: 112px;
      height: 18%;
      min-height: 72px;
      max-height: 136px;
      transform-origin: 100% 85%;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      border-radius: 8px;
      transition: transform 0.25s ease;
    }

    .gift-hotspot:hover {
      transform: scale(1.06);
    }

    .gift-hotspot:focus-visible {
      outline: 2px solid var(--pink);
      outline-offset: 4px;
    }

    .gift-hotspot::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 10px;
      background: radial-gradient(ellipse at center, rgba(249, 167, 245, 0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      animation: hotspotGlow 3s ease-in-out infinite;
    }

    .gift-hotspot:hover::before {
      opacity: 1;
    }

    @keyframes hotspotGlow {
      0%,
      100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.15);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .modal-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }

    .modal-panel {
      position: relative;
      width: min(640px, 100%);
      max-height: min(85vh, 900px);
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(165deg, #2a1520 0%, #1a0a12 50%, #120810 100%);
      border: 1px solid rgba(249, 167, 245, 0.25);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      transform: scale(0.94) translateY(12px);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-backdrop.is-open .modal-panel {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: linear-gradient(to bottom, rgba(26, 10, 18, 0.98), rgba(26, 10, 18, 0.85));
      border-bottom: 1px solid rgba(249, 167, 245, 0.12);
    }

    .modal-title {
      margin: 0;
      font-family: "Kalam", cursive;
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--pink);
      letter-spacing: 0.02em;
    }

    .modal-close {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(249, 167, 245, 0.25);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 0 1.25rem 1.5rem;
      max-height: calc(85vh - 80px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(249, 167, 245, 0.4) transparent;
    }

    .modal-body::-webkit-scrollbar {
      width: 8px;
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: rgba(249, 167, 245, 0.35);
      border-radius: 4px;
    }

    .letter-text {
      margin: 0;
      font-family: "Kalam", "Quicksand", cursive;
      font-size: clamp(0.95rem, 2.8vw, 1.05rem);
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255, 250, 252, 0.92);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .letter-stickers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 0.45rem 0.65rem;
      pointer-events: none;
    }

    .letter-stickers--top {
      margin: 0 0 1.15rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid rgba(249, 167, 245, 0.12);
    }

    .letter-stickers--end {
      margin: 1.75rem 0 0;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(249, 167, 245, 0.15);
    }

    .letter-sticker {
      display: block;
      width: clamp(58px, 17vw, 102px);
      height: auto;
      border-radius: 12px;
      filter: drop-shadow(0 5px 16px rgba(0, 0, 0, 0.5));
    }

    .letter-stickers--end .letter-sticker {
      width: clamp(52px, 14vw, 90px);
    }

    .letter-stickers picture {
      line-height: 0;
      animation: stickerBob 5s ease-in-out infinite;
    }

    .letter-stickers picture:nth-child(1) {
      animation-delay: 0s;
    }

    .letter-stickers picture:nth-child(2) {
      animation-delay: 0.4s;
    }

    .letter-stickers picture:nth-child(3) {
      animation-delay: 0.8s;
    }

    .letter-stickers picture:nth-child(4) {
      animation-delay: 1.2s;
    }

    .letter-stickers picture:nth-child(5) {
      animation-delay: 1.6s;
    }

    @keyframes stickerBob {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-4px) rotate(1.5deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter-stickers picture {
        animation: none !important;
      }
    }
  </style>
</head>

    function openModal() {
      const modal = document.getElementById("letterModal");
      const btn = document.getElementById("openLetter");
      modal.hidden = false;
      modal.classList.add("is-open");
      btn.setAttribute("aria-expanded", "true");
      document.body.style.overflow = "hidden";
      document.getElementById("closeLetter").focus();
    }

    function closeModal() {
      const modal = document.getElementById("letterModal");
      const btn = document.getElementById("openLetter");
      modal.classList.remove("is-open");
      btn.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
      setTimeout(() => {
        modal.hidden = true;
      }, 350);
      btn.focus();
    }

    document.getElementById("letterContent").textContent = LETTER;

    document.getElementById("openLetter").addEventListener("click", openModal);
    document.getElementById("closeLetter").addEventListener("click", closeModal);

    document.getElementById("letterModal").addEventListener("click", (e) => {
      if (e.target.id === "letterModal") closeModal();
    });

    document.addEventListener("keydown", (e) => {
      const modal = document.getElementById("letterModal");
      if (e.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });

    const HEART_PATH =
      "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";

    function spawnHearts(container, count, opts) {
      if (!container) return;
      const ns = "http://www.w3.org/2000/svg";
      const slow = opts && opts.slow;
      const pinkFirst = opts && opts.pinkBias !== false;

      for (let i = 0; i < count; i++) {
        const wrap = document.createElement("span");
        wrap.className = "heart-particle";
        const size = (opts && opts.sizeMin) ? opts.sizeMin + Math.random() * (opts.sizeMax - opts.sizeMin) : 14 + Math.random() * 36;
        wrap.style.left = Math.random() * 100 + "%";
        wrap.style.top = Math.random() * 100 + "%";
        const rot = -35 + Math.random() * 70;
        const dx = -18 + Math.random() * 36;
        const dy = -28 + Math.random() * -25;
        const dy2 = -20 + Math.random() * 40;
        wrap.style.setProperty("--rot", rot + "deg");
        wrap.style.setProperty("--dx", dx + "px");
        wrap.style.setProperty("--dy", dy + "px");
        wrap.style.setProperty("--dy2", dy2 + "px");
        const dur = slow ? 14 + Math.random() * 18 : 7 + Math.random() * 11;
        const delay = -Math.random() * dur;
        wrap.style.animation = (slow ? "heartDriftSlow" : "heartFloat") + " " + dur + "s ease-in-out infinite";
        wrap.style.animationDelay = delay + "s";

        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("width", String(Math.round(size)));
        svg.setAttribute("height", String(Math.round(size)));
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", HEART_PATH);
        const usePink = pinkFirst ? i % 2 === 0 : i % 2 === 1;
        path.setAttribute("fill", usePink ? "var(--pink)" : "var(--maroon)");
        svg.appendChild(path);
        wrap.appendChild(svg);
        container.appendChild(wrap);
      }
    }

    spawnHearts(document.getElementById("heartsBg"), 32, { sizeMin: 12, sizeMax: 44, slow: true });
    spawnHearts(document.getElementById("heartsOverlay"), 18, { sizeMin: 10, sizeMax: 28, slow: false });
